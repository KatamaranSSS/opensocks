services:
  api:
    build:
      context: ./backend
    container_name: opensocks-api
    environment:
      ENVIRONMENT: development
      POSTGRES_DB: opensocks
      POSTGRES_USER: opensocks
      POSTGRES_PASSWORD: opensocks
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: opensocks-db
    environment:
      POSTGRES_DB: opensocks
      POSTGRES_USER: opensocks
      POSTGRES_PASSWORD: opensocks
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opensocks -d opensocks"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
