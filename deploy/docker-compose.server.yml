services:
  ssserver:
    image: ${SSSERVER_IMAGE:-ghcr.io/shadowsocks/ssserver-rust:latest}
    container_name: opensocks-ssserver
    restart: unless-stopped
    command:
      - "ssserver"
      - "-c"
      - "/etc/shadowsocks-rust/config.json"
    volumes:
      - ./ssserver.json:/etc/shadowsocks-rust/config.json:ro
    ports:
      - "${SSSERVER_PORT}:${SSSERVER_PORT}/tcp"
      - "${SSSERVER_PORT}:${SSSERVER_PORT}/udp"
