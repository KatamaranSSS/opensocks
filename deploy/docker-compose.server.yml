services:
  ssserver:
    image: ${SSSERVER_IMAGE:-ghcr.io/shadowsocks/ssserver-rust:latest}
    container_name: opensocks-ssserver
    restart: unless-stopped
    command:
      - "sh"
      - "-lc"
      - "${SSSERVER_COMMAND:-ssserver -c /etc/shadowsocks/config.json}"
    volumes:
      - ./ssserver.json:/etc/shadowsocks/config.json:ro
    ports:
      - "${SSSERVER_PORT}:${SSSERVER_PORT}/tcp"
      - "${SSSERVER_PORT}:${SSSERVER_PORT}/udp"
