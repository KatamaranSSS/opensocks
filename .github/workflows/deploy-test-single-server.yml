name: Deploy Test Single Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint backend
        working-directory: backend
        run: ruff check app tests

      - name: Run backend tests
        working-directory: backend
        run: pytest

  deploy-test:
    runs-on: ubuntu-latest
    needs: test-backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t opensocks-api:latest ./backend

      - name: Export API image
        run: docker save -o opensocks-api.tar opensocks-api:latest

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: ssh-keyscan -p "${{ secrets.SERVER_PORT }}" -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync repository to server
        run: |
          rsync -az --delete \
            -e "ssh -p ${{ secrets.SERVER_PORT }}" \
            --exclude ".git/" \
            --exclude "__pycache__/" \
            --exclude "*.pyc" \
            --exclude "deploy/.env.server" \
            ./ "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.DEPLOY_PATH }}/"

      - name: Run remote deploy
        run: |
          ssh -p "${{ secrets.SERVER_PORT }}" "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            "DEPLOY_PATH='${{ secrets.DEPLOY_PATH }}' bash '${{ secrets.DEPLOY_PATH }}/scripts/deploy_remote.sh'"
