name: Deploy Single Shadowsocks Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-service:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate shell scripts
        run: |
          bash -n scripts/bootstrap_ubuntu_server.sh
          bash -n scripts/deploy_remote.sh
          bash -n scripts/deploy_ss2022_test.sh
          bash -n scripts/generate_password.sh
          bash -n scripts/generate_ss2022_key.sh
          bash -n scripts/issue_ss_config.sh
          bash -n scripts/remove_ss_user.sh
          bash -n scripts/list_ss_users.sh
          bash -n scripts/list_ss_configs.sh
          bash -n scripts/print_ss_config.sh
          bash -n scripts/print_ss2022_config.sh

      - name: Validate docker compose
        run: |
          docker compose --env-file deploy/.env.server.example -f deploy/docker-compose.server.yml config >/tmp/opensocks-compose.yml
          docker compose --env-file deploy/.env.server.example -f deploy/docker-compose.ss2022-test.yml config >/tmp/opensocks-compose-ss2022.yml

      - name: Validate bot script syntax
        run: python3 -m py_compile bot/config_bot.py

      - name: Validate ss uri generator
        run: |
          output="$(bash scripts/print_ss_config.sh smoke-test deploy/.env.server.example)"
          printf '%s\n' "$output"
          grep -q '^ss://' <<<"$output"
          obfs_env="$(mktemp)"
          cp deploy/.env.server.example "$obfs_env"
          printf '\nSSSERVER_OBFS_ENABLED=true\n' >>"$obfs_env"
          obfs_output="$(bash scripts/print_ss_config.sh smoke-obfs "$obfs_env")"
          printf '%s\n' "$obfs_output"
          grep -q '^ss://.*plugin=' <<<"$obfs_output"
          ss2022_output="$(bash scripts/print_ss2022_config.sh smoke-2022 deploy/.env.server.example)"
          printf '%s\n' "$ss2022_output"
          grep -q '^ss://' <<<"$ss2022_output"

  deploy-test:
    runs-on: ubuntu-latest
    needs: validate-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: ssh-keyscan -p "${{ secrets.SERVER_PORT }}" -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync repository to server
        run: |
          rsync -az --delete \
            -e "ssh -p ${{ secrets.SERVER_PORT }}" \
            --exclude ".git/" \
            --exclude ".venv/" \
            --exclude "bot/.env" \
            --exclude "deploy/.env.server" \
            --exclude "deploy/ssserver.json" \
            --exclude "deploy/users.txt" \
            --exclude "deploy/bot_state.json" \
            ./ "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.DEPLOY_PATH }}/"

      - name: Run remote deploy
        run: |
          ssh -p "${{ secrets.SERVER_PORT }}" "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            "DEPLOY_PATH='${{ secrets.DEPLOY_PATH }}' bash '${{ secrets.DEPLOY_PATH }}/scripts/deploy_remote.sh'"
